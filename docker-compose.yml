services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "127.0.0.1:5432:5432"  # localhost only — for running alembic/psql from the host
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # llm-guard sidecar (Phase 3). Heavy model set (Presidio/spaCy + DeBERTa) runs
  # here, not in the app image, so the two failure domains stay decoupled (ADR-005).
  # Pinned tag; CPU variant. Not published on the host — only the app reaches it.
  llm-guard-api:
    image: laiyer/llm-guard-api:0.3.16
    environment:
      AUTH_TOKEN: ${GUARDRAILS_AUTH_TOKEN:-dev-guardrails-token}
      LOG_LEVEL: ${GUARDRAILS_LOG_LEVEL:-INFO}
    volumes:
      - ./guardrails/scanners.yml:/home/user/app/config/scanners.yml:ro
    healthcheck:
      # Image ships python (it's a python app) but not necessarily curl.
      test: ["CMD-SHELL", "python -c \"import urllib.request as u,sys; sys.exit(0 if u.urlopen('http://localhost:8000/readyz').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s  # first boot downloads/loads the scanner models

  app:
    build: .
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}
      # Request path runs as the non-owner app_rt role so RLS is enforced.
      APP_RT_PASSWORD: ${APP_RT_PASSWORD:-app_rt}
      RUNTIME_DATABASE_URL: postgresql://app_rt:${APP_RT_PASSWORD:-app_rt}@db:5432/${POSTGRES_DB:-app}
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5}
      # Guardrail sidecar. Calls are fail-closed, so the app only serves once the
      # sidecar is healthy (depends_on below).
      GUARDRAILS_URL: ${GUARDRAILS_URL:-http://llm-guard-api:8000}
      GUARDRAILS_AUTH_TOKEN: ${GUARDRAILS_AUTH_TOKEN:-dev-guardrails-token}
    volumes:
      - ./app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      db:
        condition: service_healthy
      llm-guard-api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  pgdata:
